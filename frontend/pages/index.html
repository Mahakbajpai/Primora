<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primora — Login</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo + Brand -->
      <img src="/static/assets/primora_logo.png" class="login-logo-img" alt="Primora Logo" />
      <div class="login-brand">PRIMORA</div>
      <div class="login-tagline">Smart Purchase Order &amp; Vendor Management System</div>

      <!-- Discount Banner -->
      <div class="discount-banner" style="text-align:left;">
        <span class="discount-pill">20% OFF</span>
        <div>
          <div style="font-size:0.85rem; color:var(--text-primary); font-weight:500;">First-time user offer</div>
          <div style="font-size:0.75rem; color:var(--text-muted);">
            <span class="strikethrough">₹4,999/mo</span>
            &nbsp;→&nbsp;<strong style="color:var(--accent);">₹3,999/mo</strong>
          </div>
        </div>
      </div>

      <!-- Google Login -->
      <button class="btn btn-secondary" style="width:100%; justify-content:center; margin-bottom:1rem;" onclick="handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.706c-.18-.54-.282-1.117-.282-1.706s.102-1.166.282-1.706V4.962H.957C.347 6.175 0 7.55 0 9s.347 2.825.957 4.038l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or sign in with credentials</div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter your name" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="handleLocalLogin()">
        Enter Primora →
      </button>

      <p style="margin-top:1.5rem; font-size:0.75rem; color:var(--text-muted); font-family:var(--font-mono);">
        Need help? Chat with us on
        <a href="https://wa.me/918604996636" target="_blank" style="color:var(--whatsapp);">WhatsApp</a>
      </p>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/shared.js"></script>
  <script>
    if (sessionStorage.getItem('poms_auth')) window.location.href = '/dashboard';

    function handleLocalLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      if (!user || !pass) { showToast('Please enter username and password.', 'error'); return; }
      sessionStorage.setItem('poms_auth', JSON.stringify({ user, loginAt: new Date().toISOString() }));
      showToast('Welcome to Primora, ' + user + '!', 'success', 1500);
      setTimeout(() => window.location.href = '/dashboard', 1300);
    }

    function handleGoogleLogin() {
      showToast('Google OAuth requires a Client ID in .env. Use local login for demo.', 'info', 4000);
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLocalLogin();
    });

    injectWhatsApp();
  </script>
</body>
</html>
